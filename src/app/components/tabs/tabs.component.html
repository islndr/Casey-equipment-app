<!-- filepath: src/app/components/tabs/tabs.component.html -->
<div class="container mt-5">
  <div class="tabs">
    <ul class="nav nav-tabs" id="myTab" role="tablist">
      <li class="nav-item" *ngFor="let tab of tabs">
        <a class="nav-link" [class.active]="tab === selectedTab" (click)="selectTab(tab)">
          {{ tab.title }}
          <app-contact-info *ngIf="tab.isContact"></app-contact-info>
          <div *ngIf="showEditMenu && !tab.isContact" class="tab-buttons">
            <button class="btn btn-sm btn-primary" (click)="editTab(tab)" title="Edit Tab">✏️</button>
            <button class="btn btn-sm btn-danger" (click)="deleteTab(tab)" title="Delete Tab">❌</button>
          </div>
        </a>
      </li>
      <li class="nav-item edit-menu">
        <span class="nav-link" (click)="toggleEditMenu()">Edit Tabs</span>
        <span *ngIf="showEditMenu" class="nav-link">
          <span (click)="addTab()" class="add-tab" title="Add Tab">➕</span>
        </span>
      </li>
    </ul>
    <div class="tab-content" id="myTabContent">
      <div class="tab-pane fade show active" *ngIf="selectedTab">
        <ng-container *ngIf="selectedTab.isContact; else tableContent">
          <p>{{ selectedTab.content }}</p>
        </ng-container>
        <ng-template #tableContent>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Column 1</th>
                <th>Column 2</th>
                <th>Column 3</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Data 1</td>
                <td>Data 2</td>
                <td>Data 3</td>
              </tr>
              <!-- Add more rows as needed -->
            </tbody>
          </table>
        </ng-template>
      </div>
    </div>
  </div>
</div>
